<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mansion 1 Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    name="description"
    content="Mansion-1 Shop – browse and buy custom merch powered by Printify."
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Mansion 1 Shop</h1>
    <p>Custom gear, fresh designs, and more—hosted on Printify.</p>

    <a
      class="shop-button"
      href="https://mansion-1-shop.printify.me/"
      target="_blank"
      rel="noopener noreferrer"
    >
      Enter the Shop
    </a>

    <section class="info">
      <h2>What you’ll find</h2>
      <ul>
        <li>Unique Mansion 1 themed designs</li>
        <li>Print-on-demand apparel and accessories</li>
        <li>Secure checkout via Printify</li>
      </ul>
    </section>

    <footer>
      <p>© <span id="year"></span> TimeLapse Games. All rights reserved.</p>
    </footer>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
